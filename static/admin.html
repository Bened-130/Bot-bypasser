<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Live Results</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.2/dist/axios.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
               background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #fff; 
               margin: 0; padding: 20px; min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #8892b0; margin-bottom: 20px; }
        .url-box { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .url-box input { width: 100%; padding: 8px; border-radius: 4px; border: none; font-family: monospace; }
        .url-box label { display: block; margin-bottom: 5px; font-size: 12px; color: #8892b0; }
        .chart-container { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 20px; }
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); 
                 gap: 15px; margin-top: 20px; }
        .stat-card { background: rgba(255,255,255,0.08); padding: 15px; border-radius: 8px; text-align: center; }
        .stat-value { font-size: 2em; font-weight: bold; color: #64ffda; }
        .stat-label { color: #8892b0; font-size: 0.9em; }
        .status { text-align: center; margin-top: 20px; }
        .live-indicator { display: inline-flex; align-items: center; gap: 8px; 
                         color: #64ffda; font-weight: 500; }
        .pulse { width: 8px; height: 8px; background: #64ffda; border-radius: 50%; 
                 animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .controls { text-align: center; margin-bottom: 20px; }
        .btn { background: #64ffda; color: #1a1a2e; border: none; padding: 10px 20px; 
               border-radius: 6px; cursor: pointer; font-weight: 600; margin: 0 5px; }
        .btn:hover { background: #4fd1c5; }
        .debug { background: rgba(0,0,0,0.3); padding: 10px; font-family: monospace; 
                 font-size: 11px; margin-top: 20px; border-radius: 6px; max-height: 100px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Live Voting Results</h1>
        <p class="subtitle">Real-time vote distribution</p>
        
        <div class="url-box">
            <label>API Server URL:</label>
            <input type="text" id="api-url" value="http://localhost:5000" placeholder="http://localhost:5000">
        </div>
        
        <div class="controls">
            <button class="btn" onclick="loadData()">🔄 Refresh Data</button>
            <button class="btn" onclick="resetVotes()">Reset Votes</button>
        </div>
        
        <div class="chart-container">
            <canvas id="voteChart"></canvas>
        </div>
        
        <div class="stats" id="stats-container"></div>
        
        <div class="status">
            <span class="live-indicator">
                <span class="pulse"></span>
                <span id="status-text">Live Updates Active</span>
            </span>
        </div>
        
        <div id="debug-log" class="debug"></div>
    </div>

    <script>
        // ============================================
        // CONFIG
        // ============================================
        const PUSHER_KEY = 'YOUR_APP_KEY';        // ← REPLACE
        const PUSHER_CLUSTER = 'YOUR_CLUSTER';    // ← REPLACE
        
        // ============================================
        const getUrl = (ep) => {
            const base = document.getElementById('api-url').value.trim().replace(/\/+$/, '');
            return base + (ep.startsWith('/') ? ep : '/' + ep);
        };
        
        let pusher, channel, chart;
        
        function log(msg) {
            console.log(msg);
            document.getElementById('debug-log').innerHTML += `<div>${new Date().toLocaleTimeString()}: ${msg}</div>`;
        }
        
        function initChart(data) {
            const ctx = document.getElementById('voteChart').getContext('2d');
            const colors = ['#ff6384', '#36a2eb', '#ffce56', '#4bc0c0', '#9966ff', '#ff9f40'];
            
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.map(d => d.name),
                    datasets: [{
                        label: 'Votes',
                        data: data.map(d => d.votes),
                        backgroundColor: colors,
                        borderRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, ticks: { color: '#8892b0', stepSize: 1 },
                             grid: { color: 'rgba(255,255,255,0.1)' } },
                        x: { ticks: { color: '#fff' }, grid: { display: false } }
                    }
                }
            });
            updateStats(data);
        }
        
        function updateChart(data) {
            if (!chart) return;
            chart.data.labels = data.map(d => d.name);
            chart.data.datasets[0].data = data.map(d => d.votes);
            chart.update('none');
            updateStats(data);
        }
        
        function updateStats(data) {
            const total = data.reduce((s, i) => s + i.votes, 0);
            const leader = data.reduce((m, i) => i.votes > m.votes ? i : m, data[0]);
            
            document.getElementById('stats-container').innerHTML = `
                <div class="stat-card"><div class="stat-value">${total}</div><div class="stat-label">Total Votes</div></div>
                <div class="stat-card"><div class="stat-value">${data.length}</div><div class="stat-label">Candidates</div></div>
                <div class="stat-card"><div class="stat-value">${leader.name}</div><div class="stat-label">Leading (${leader.votes})</div></div>
                <div class="stat-card"><div class="stat-value">${total>0?(total/data.length).toFixed(1):0}</div><div class="stat-label">Avg</div></div>
            `;
        }
        
        async function loadData() {
            try {
                const res = await axios.get(getUrl('/api/names'), {timeout: 10000});
                log('Loaded ' + res.data.length + ' candidates');
                if (!chart) initChart(res.data);
                else updateChart(res.data);
            } catch (e) {
                log('❌ Load failed: ' + e.message);
                alert('Failed to load. Check URL: ' + getUrl('/api/names'));
            }
        }
        
        async function resetVotes() {
            if (!confirm('Reset all votes?')) return;
            try {
                await axios.post(getUrl('/api/reset'), {}, {timeout: 10000});
                log('Reset successful');
                loadData();
            } catch (e) {
                log('❌ Reset failed: ' + e.message);
            }
        }
        
        function init() {
            // Pusher
            if (PUSHER_KEY !== 'YOUR_APP_KEY') {
                pusher = new Pusher(PUSHER_KEY, { cluster: PUSHER_CLUSTER, encrypted: true });
                channel = pusher.subscribe('poll');
                channel.bind('vote', data => {
                    log('📥 Live update');
                    updateChart(data);
                });
            } else {
                document.getElementById('status-text').textContent = 'Manual refresh mode (configure Pusher for realtime)';
            }
            
            // Initial load
            loadData();
        }
        
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
